<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="100%" height="100%">
  <!-- Definitions for text paths -->
  <defs>
    <!-- Path for VENITE UNIVERSITY on top (Clockwise curve over the top) -->
    <path id="textPathTop" d="M 35 100 A 65 65 0 0 1 165 100" fill="none" />
    <!-- Path for ILORO EKITI on bottom (Counter-clockwise curve along the bottom, left to right) -->
    <path id="textPathBottom" d="M 38 100 A 62 62 0 0 0 162 100" fill="none" />
    
    <!-- Filter for elegant shadow -->
    <filter id="logoShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Outer rope/ring border -->
  <circle cx="100" cy="100" r="92" fill="#ffffff" stroke="#cfa145" stroke-width="4.5" filter="url(#logoShadow)" />
  <!-- Braided inner pattern with dashed circle -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#99701d" stroke-width="1.5" stroke-dasharray="3 3" />
  <circle cx="100" cy="100" r="84" fill="none" stroke="#cfa145" stroke-width="1" />

  <!-- Inner Badge Area -->
  <circle cx="100" cy="100" r="62" fill="#ffffff" stroke="#003366" stroke-width="2" />

  <!-- Green landscape in lower half of inner circle -->
  <g clip-path="url(#innerCircleClip)">
    <clipPath id="innerCircleClip">
      <circle cx="100" cy="100" r="60" />
    </clipPath>
    <!-- Green landscape background -->
    <rect x="35" y="100" width="130" height="70" fill="#1b9d4c" />
    <!-- Perspective dark green pillars/fields extending downwards -->
    <polygon points="100,100 96,160 104,160" fill="#10602c" opacity="0.85" />
    <polygon points="100,100 74,160 88,160" fill="#10602c" opacity="0.85" />
    <polygon points="100,100 48,150 62,160" fill="#10602c" opacity="0.85" />
    <polygon points="100,100 112,160 126,160" fill="#10602c" opacity="0.85" />
    <polygon points="100,100 138,160 152,150" fill="#10602c" opacity="0.85" />
    
    <!-- Horizon line -->
    <line x1="30" y1="100" x2="170" y2="100" stroke="#003366" stroke-width="2" />
  </g>

  <!-- Open Book on the horizon -->
  <g transform="translate(100, 95) scale(0.95)">
    <!-- Book pages (white with thin borders) -->
    <path d="M -22 -10 Q -11 -15 0 -10 Q 11 -15 22 -10 L 22 10 Q 11 5 0 10 Q -11 5 -22 10 Z" fill="#ffffff" stroke="#4a1810" stroke-width="1.5" />
    <!-- Middle spine of the book -->
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#4a1810" stroke-width="1.5" />
    <!-- Inner page detail lines -->
    <path d="M -18 -5 Q -10 -9 -3 -6" fill="none" stroke="#7a2d21" stroke-width="0.8" />
    <path d="M -18 -1 Q -10 -5 -3 -2" fill="none" stroke="#7a2d21" stroke-width="0.8" />
    <path d="M -18 3 Q -10 -1 -3 2" fill="none" stroke="#7a2d21" stroke-width="0.8" />
    
    <path d="M 18 -5 Q 10 -9 3 -6" fill="none" stroke="#7a2d21" stroke-width="0.8" />
    <path d="M 18 -1 Q 10 -5 3 -2" fill="none" stroke="#7a2d21" stroke-width="0.8" />
    <path d="M 18 3 Q 10 -1 3 2" fill="none" stroke="#7a2d21" stroke-width="0.8" />
  </g>

  <!-- Golden Key above the book -->
  <g transform="translate(100, 68) scale(0.9)">
    <!-- Shaft -->
    <rect x="-24" y="-2" width="48" height="4" fill="#cfa145" stroke="#99701d" stroke-width="0.8" rx="1" />
    <!-- Bow (Key handle - round decorative) -->
    <circle cx="-24" cy="0" r="7" fill="none" stroke="#99701d" stroke-width="2" />
    <circle cx="-24" cy="0" r="4" fill="none" stroke="#cfa145" stroke-width="1.2" />
    <!-- Key Cuts/Bit on the right -->
    <rect x="14" y="2" width="4" height="6" fill="#cfa145" stroke="#99701d" stroke-width="0.8" />
    <rect x="20" y="2" width="4" height="6" fill="#cfa145" stroke="#99701d" stroke-width="0.8" />
    <rect x="17" y="5" width="4" height="3" fill="#cfa145" />
  </g>

  <!-- Dot accents on the sides of inner circle -->
  <circle cx="48" cy="100" r="3" fill="#1b9d4c" />
  <circle cx="41" cy="108" r="2.5" fill="#1b9d4c" />
  <circle cx="43" cy="92" r="2.5" fill="#1b9d4c" />
  
  <circle cx="152" cy="100" r="3" fill="#1b9d4c" />
  <circle cx="159" cy="108" r="2.5" fill="#1b9d4c" />
  <circle cx="157" cy="92" r="2.5" fill="#1b9d4c" />

  <!-- Curved Text -->
  <text font-family="'Poppins', 'Montserrat', 'Arial', sans-serif" font-weight="900" font-size="11.5" fill="#1a202c" letter-spacing="0.5">
    <!-- TOP TEXT: VENITE UNIVERSITY -->
    <textPath href="#textPathTop" startOffset="50%" text-anchor="middle">VENITE UNIVERSITY</textPath>
  </text>
  
  <text font-family="'Poppins', 'Montserrat', 'Arial', sans-serif" font-weight="900" font-size="10.5" fill="#1a202c" letter-spacing="0.5">
    <!-- BOTTOM TEXT: ILORO EKITI -->
    <textPath href="#textPathBottom" startOffset="50%" text-anchor="middle">ILORO EKITI</textPath>
  </text>

  <!-- Motto Banner at the bottom -->
  <g transform="translate(100, 192)">
    <!-- Curved Ribbon/Banner path -->
    <path d="M -85 -10 Q 0 5 85 -10 L 80 10 Q 0 25 -80 10 Z" fill="#4d44b5" stroke="#312a8a" stroke-width="1" />
    <!-- Ribbon tails -->
    <polygon points="-85,-10 -98,2 -80,10" fill="#312a8a" />
    <polygon points="85,-10 98,2 80,10" fill="#312a8a" />
    <!-- Motto Text -->
    <text x="0" y="5" font-family="'Poppins', 'Montserrat', 'Arial', sans-serif" font-weight="800" font-size="6.3" fill="#ffffff" text-anchor="middle" letter-spacing="0.2">
      DISCIPLINA, NOTITIA, INDUSTRIA ET INGENIUM
    </text>
  </g>
</svg>
